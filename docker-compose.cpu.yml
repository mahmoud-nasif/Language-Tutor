services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      APP_ENV: development
      LOG_LEVEL: INFO
      HOST: 0.0.0.0
      PORT: 8000
      PYTHONPATH: /app/src
      HF_HOME: /app/data/huggingface
      DEVICE: cpu
      LLM_PROVIDER: ollama
      LLM_MODEL: qwen2.5:7b-instruct
      OLLAMA_BASE_URL: http://ollama:11434
      DATABASE_URL: sqlite:///data/polyglot.db
    ports:
      - "8000:8000"
    volumes:
      - ./:/app
      - app-data:/app/data
    depends_on:
      ollama:
        condition: service_started
    restart: unless-stopped
    command:
      [
        "uvicorn",
        "polyglot.api.app:app",
        "--host",
        "0.0.0.0",
        "--port",
        "8000",
        "--reload",
        "--reload-dir",
        "/app/src",
      ]
    deploy:
      resources:
        reservations:
          devices: []

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama-models:/root/.ollama
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices: []

volumes:
  app-data:
  ollama-models:
