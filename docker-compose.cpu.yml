services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      APP_ENV: development
      LOG_LEVEL: INFO
      HOST: 0.0.0.0
      PORT: 8000
      DEVICE: cpu
      LLM_PROVIDER: ollama
      LLM_MODEL: qwen2.5:7b-instruct
      OLLAMA_BASE_URL: http://ollama:11434
      DATABASE_URL: sqlite:///data/polyglot.db
    ports:
      - "8000:8000"
    volumes:
      - app-data:/app/data
      - hf-cache:/home/app/.cache/huggingface
    depends_on:
      ollama:
        condition: service_started
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices: []

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama-models:/root/.ollama
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices: []

volumes:
  app-data:
  hf-cache:
  ollama-models:
